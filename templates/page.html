<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Customer Details</title>
        <style>
            * {
                box-sizing: border-box;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #f3f4f6;
            }

            .card {
                background: #ffffff;
                border-radius: 18px;
                padding: 28px 32px;
                max-width: 480px;
                width: 100%;
                box-shadow: 0 16px 32px rgba(15, 23, 42, 0.15);
            }

            .badge {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 6px 14px;
                border-radius: 999px;
                background: #fef9c3;
                color: #854d03;
                font-size: 12px;
                font-weight: 600;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                margin-bottom: 10px;
            }

            .emoji {
                font-size: 32px;
                margin-bottom: 8px;
            }

            h1 {
                margin: 0 0 8px;
                font-size: 28px;
                color: #111827;
            }

            .subtitle {
                font-size: 13px;
                color: #6b7280;
                margin-bottom: 20px;
            }

            .highlight {
                font-size: 20px;
                font-weight: 600;
                color: #111827;
                margin-bottom: 4px;;
            }

            .details {
                font-size: 14px;
                color: #4b5563;
                margin-bottom: 24px;
            }

            .empty-state {
                font-size: 15px;
                color: #4b5563;
                margin-bottom: 24px;
            }

            .buttons {
                display: flex;
                justify-content: center;
                gap: 12px;
                flex-wrap: wrap;
            }

            .btn {
                border: none;
                border-radius: 999px;
                padding: 10px 19px;
                font-size: 14px;
                font-weight: 500;
                text-decoration: none;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
                transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease, color 0.12s ease
            }
            .btn-primary {
                border: none;
                border-radius: 999px;
                padding: 9px 18px;
                font-size: 14px;
                font-weight: 500;
                background: #2563eb;
                color: #ffffff;
                cursor: pointer;
                box-shadow: 0 8px 16px rgba(37, 99, 235, 0.35);
            }

            .btn-primary:hover {
                background: #1d4ed8;
                transform: translateY(-1px);
                box-shadow: 0 10px 20px rgba(37, 99, 235, 0.45);
            }

            .link-btn {
                text-decoration: none;
                font-size: 13px;
                color: #2563eb;
            }

            .hint {
                margin-top: 10px;
                font-size: 11px;
                color: #9ca3af;
            }
        </style>
    </head>
    <body>

    </body>
