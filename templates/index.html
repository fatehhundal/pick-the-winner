<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Customer Details</title>
        <style>
            * {
                box-sizing: border-box;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            }
            
            body {
                margin: 0;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: #f3f4f6;
            }

            .card {
                background: #ffffff;
                border-radius: 18px;
                padding: 28px 32px;
                max-width: 480px;
                width: 100%;
                box-shadow: 0 16px 32px rgba(15, 23, 42, 0.15);
            }

            h2 {
                margin: 0 0 4px;
                font-size: 24px;
                color: #111827;
            }

            .subtitle {
                font-size: 13px;
                color: #6b7280;
                margin-bottom: 20px;
            }

            label {
                display: block;
                margin-bottom: 10px;
                font-size: 14px;
                font-size: 14px;
                color: #374151;
            }

            input[type="text"], input[type="number"], input[type="date"] {
                width: 100%;
                padding: 8px 10px;
                border-radius: 8px;
                border: 1px solid #d1d5db;
            }

            input[type="text"]:focus, input[type="number"]:focus, input[type="text"]:focus {
                outline: none;
                border-color: #2563eb;
                box-shadow: 0 0 0 1px #2563eb33;
            }

            .actions {
                margin-top: 18px;
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                align-items: center;
            }

            .btn-primary {
                border: none;
                border-radius: 999px;
                padding: 9px 18px;
                font-size: 14px;
                font-weight: 500;
                background: #2563eb;
                color: #ffffff;
                cursor: pointer;
                box-shadow: 0 8px 16px rgba(37, 99, 235, 0.35);
            }

            .btn-primary:hover {
                background: #1d4ed8;
            }

            .link-btn {
                text-decoration: none;
                font-size: 13px;
                color: #2563eb;
            }

            .hint {
                margin-top: 10px;
                font-size: 11px;
                color: #9ca3af;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h2>Customer Entry</h2>
            <p class="subtitle">Fill in today's purchase details to join the daily winner contest.</p>

            <form action="/details" method="POST">
                <label>
                    Name
                    <input type="text" name="user_name" required>
                </label>
                
                <label>
                    Phone number
                    <input type="text" name="contact_number" required>
                </label>

                <label>
                    Total items
                    <input type="text" name="number_of_items" required>
                </label>

                <label>
                    Total amount
                    <input type="number" name="amount" required>
                </label>

                <label>
                    Date
                    <input type="date" name="current_date" required>
                </label>

                <div class="actions">
                    <button type="submit" class="btn-primary">Submit entry</button>
                    <a href="/winner" class="link-btn">See today's winner</a>
                </div>

                <p class="hint"> The winner is choesen by the highest total amount for today's date. </p>
            </form>
        </div>
    </body>
</html>
